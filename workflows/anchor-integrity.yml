name: anchor-integrity

on:
  push:
    paths:
      - "anchors/ANCHOR_REF"
      - "anchors/ANCHOR_SHA256.lock"
      - "scripts/check_anchor.py"
      - ".github/workflows/anchor-integrity.yml"
      - "**/*.py"
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
  pull_request:
    paths:
      - "anchors/ANCHOR_REF"
      - "anchors/ANCHOR_SHA256.lock"
      - "scripts/check_anchor.py"
      - ".github/workflows/anchor-integrity.yml"
      - "**/*.py"
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"

jobs:
  verify-anchor-integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify canonical anchor lock
        run: |
          python scripts/check_anchor.py \
            --ref anchors/ANCHOR_REF \
            --lock anchors/ANCHOR_SHA256.lock
