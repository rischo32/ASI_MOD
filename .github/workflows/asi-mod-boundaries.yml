name: asi-mod-boundaries

on:
  push:
    paths:
      - "**/*.py"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.md"
      - ".github/workflows/asi-mod-boundaries.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.md"
      - ".github/workflows/asi-mod-boundaries.yml"

jobs:
  verify-asi-mod-boundaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if simulation-layer symbols appear in ASI_MOD
        run: |
          ! grep -R -nE "class +EventModel|def +build_context|def +simulate_|def +projection_engine|def +coherence_predicate" . \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude=README.md
