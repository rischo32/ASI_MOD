name: anchor-integrity

on:
  push:
    paths:
      - "anchors/ANCHOR_REF"
      - "anchors/ANCHOR_SHA256.lock"
      - "scripts/check_upstream_anchor.py"
      - ".github/workflows/anchor-integrity.yml"

  pull_request:
    paths:
      - "anchors/ANCHOR_REF"
      - "anchors/ANCHOR_SHA256.lock"
      - "scripts/check_upstream_anchor.py"
      - ".github/workflows/anchor-integrity.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-upstream-anchor-integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Manual trusted checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail

          git init --initial-branch=main .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "refs/pull/${PR_NUMBER}/head"
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_SHA_VALUE}"
          fi

          git checkout --force FETCH_HEAD

      - name: Fetch canonical VECTAETOS anchor
        run: |
          set -euo pipefail

          mkdir -p .runtime/upstream
          git init --initial-branch=main .runtime/upstream/Vectaetos
          cd .runtime/upstream/Vectaetos

          git remote add origin "https://github.com/rischo32/Vectaetos.git"
          git fetch --no-tags --depth=1 origin main
          git checkout --force FETCH_HEAD

      - name: Verify Python runtime
        run: |
          set -euo pipefail
          python3 --version
          python3 -m py_compile scripts/check_upstream_anchor.py

      - name: Verify downstream anchor against VECTAETOS
        run: |
          set -euo pipefail

          python3 scripts/check_upstream_anchor.py \
            --upstream .runtime/upstream/Vectaetos/anchors/TRIADIC_REPOSITORY_ANCHOR.md \
            --ref anchors/ANCHOR_REF \
            --lock anchors/ANCHOR_SHA256.lock
